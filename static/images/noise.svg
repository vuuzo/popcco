<svg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'>
  <filter id='grain'>
    <feTurbulence 
      opacity='0.8'
      type='fractalNoise' 
      baseFrequency='1.26' 
      numOctaves='1' 
      stitchTiles='stitch'/>
    <feComponentTransfer in="noise">
      <feFuncA type="table" tableValues="0 0.5" />
    </feComponentTransfer>
  </filter>
  
  <rect width='100%' height='100%' filter='url(#grain)'/>
</svg>
