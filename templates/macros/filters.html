{% macro sort_filter(genres, current_genre, current_sort, context='movies') %}
<div class="filter-container">
  <div class="filter-group">
    <label for="genre-select" class="filter-label">Gatunek:</label>
    <div class="select-wrapper">
      <select id="genre-select" class="filter-select" onchange="update_query('genre', this.value)">
        <option value="all" {% if current_genre == 'all' %}selected{% endif %}>Wszystkie</option>
        {% for g in genres %}
        <option value="{{ g.name }}" {% if current_genre == g.name %}selected{% endif %}>{{ g.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="filter-group">
    <label for="sort-select" class="filter-label">Sortuj:</label>
    <div class="select-wrapper">
      <select id="sort-select" class="filter-select" onchange="update_query('sort', this.value)">
        <option value="newest" {% if current_sort == 'newest' %}selected{% endif %}>
          {% if context == 'movies' %}Ostatnio obejrzane{% else %}Ostatnio dodane{% endif %}
        </option>
        <option value="oldest" {% if current_sort == 'oldest' %}selected{% endif %}>
          {% if context == 'movies' %}Dawno obejrzane{% else %}Dawno dodane{% endif %}
        </option>
        {% if context == 'movies' %}
        <option value="rating_desc" {% if current_sort == 'rating_desc' %}selected{% endif %}>Najlepsze oceny</option>
        <option value="rating_asc" {% if current_sort == 'rating_asc' %}selected{% endif %}>Najgorsze oceny</option>
        {% else %}
        <option value="a_z" {% if current_sort == 'a_z' %}selected{% endif %}>Tytuł A-Z</option>
        <option value="z_a" {% if current_sort == 'z_a' %}selected{% endif %}>Tytuł Z-A</option>
        {% endif %}
      </select>
    </div>
  </div>
</div>
<script>
  function update_query(key, value) {
      const url = new URL(window.location.href);
      url.searchParams.set(key, value);
      window.location.href = url.toString();
  }
</script>
{% endmacro %}
