{% macro button_eye(is_watched) %}
<button
  type="submit"
  class="action-icon-eye"
  data-watched="{{'true' if is_watched else 'false'}}"
>
  <svg width="32" height="32">
    <use href="#icon-eye"></use>
  </svg>
</button>
{% endmacro %}
{% macro button_save(on_watchlist) %}
<button
  type="submit"
  class="action-icon-save"
  data-watchlist="{{'true' if on_watchlist else 'false'}}"
>
  <svg width="32" height="32">
    <use href="#icon-save"></use>
  </svg>
</button>
{% endmacro %}
